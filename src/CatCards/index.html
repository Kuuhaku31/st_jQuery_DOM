<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Cards</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="app">
    <section class="panel top-overview">
      <div class="header">
        <h1>随机猫咪卡片大战</h1>
        <div class="actions">
          <button id="restart-game">New Game</button>
        </div>
      </div>

      <div class="top-meta">
        <div class="status-grid compact-status">
          <div class="status-item">
            <div class="label">回合</div>
            <div id="round-text" class="value"></div>
          </div>
          <div class="status-item">
            <div class="label">玩家卡牌数</div>
            <div id="card-count" class="value"></div>
          </div>
        </div>

        <section class="message-panel" aria-label="游戏消息">
          <h2>游戏消息</h2>
          <div id="game-massage"></div>
        </section>
      </div>
    </section>

    <section id="battle-area" class="panel">
      <div class="battle-side">
        <h2>我方出战卡</h2>
        <div id="selected-card"></div>
      </div>
      <div class="battle-vs" aria-label="对战标识">
        <h2>VS</h2>
      </div>
      <div class="battle-side">
        <h2>电脑卡牌</h2>
        <div id="enemy-card"></div>
      </div>
    </section>
    <button id="battle-btn" class="secondary" disabled>开始对局</button>
    <section class="panel">
      <div class="section-head">
        <h2>玩家卡组</h2>
        <div class="sort-controls" aria-label="卡牌排序设置">
          <label for="sort-by">排序属性</label>
          <select id="sort-by">
            <option value="none">默认顺序</option>
            <option value="life">生命值</option>
            <option value="attack">攻击力</option>
            <option value="defense">防御力</option>
            <option value="maxLife">最大生命值</option>
            <option value="name">名称</option>
          </select>

          <label for="sort-order">顺序</label>
          <select id="sort-order">
            <option value="desc">降序</option>
            <option value="asc">升序</option>
          </select>

          <label class="filter-alive" for="filter-alive">
            <input id="filter-alive" type="checkbox" />
            仅显示生命值 &gt; 0
          </label>
        </div>
      </div>
      <div id="player-cards" class="cards"></div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./main.js"></script>
</body>

</html>
