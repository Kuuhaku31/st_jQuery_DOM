<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ISP07</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <style>
      .card {
        border: 1px solid #000;
        padding: 8px;
        margin: 5px;
      }
    </style>
  </head>

  <body>
    <input type="text" id="name" placeholder="名前" />
    <input type="number" id="age" placeholder="年齢" />
    <button id="add">追加</button>

    <div id="list"></div>

    <script>
      $(function () {
        const users = [];

        $("#add").click(function () {
          const name = $("#name").val();
          const age = $("#age").val();

          if (name && age) {
            const user = {
              name: name,
              age: age,
            };
            users.push(user);
            render(users);

            // 清空输入框
            $("#name").val("");
            $("#age").val("");
          } else {
            alert("名前と年齢を入力してください！");
          }
        });
      });

      // 渲染用户列表
      function render(users) {
        $("#list").html("");

        for (const user of users) {
          const card = $("<div>");
          card.text("名前: " + user.name + ", 年齢: " + user.age);
          card.addClass("card");
          $("#list").append(card);
        }
      }
    </script>
  </body>
</html>
