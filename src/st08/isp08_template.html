<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ISP08</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <style>
      .win {
        color: green;
      }
      .lose {
        color: red;
      }
      .draw {
        color: gray;
      }
      .gun_button {
        background-color: rgba(255, 213, 0, 0.975);
      }
    </style>
  </head>
  <body>
    <input type="text" id="name" placeholder="名前" />
    <button class="hand" data-hand="✊">✊</button>
    <button class="hand" data-hand="✌️">✌️</button>
    <button class="hand" data-hand="✋">✋</button>
    <button class="hand gun_button" data-hand="🔫">🔫</button>
    <h3 id="score"></h3>
    <ul id="history"></ul>
    <script>
      // 定义常量
      const TEXT_ROCK = "✊";
      const TEXT_SCISSORS = "✌️";
      const TEXT_PAPER = "✋";
      const TEXT_GUN = "🔫";

      const TEXT_WIN = "勝ち";
      const TEXT_LOSE = "負け";
      const TEXT_DRAW = "引き分け";

      $(function () {
        let history = [];
        let CPU_hands = [TEXT_ROCK, TEXT_SCISSORS, TEXT_PAPER];
        let comboCount = 0; // 连击次数

        $("#name").val("プレイヤー");
        render(history);

        // 按钮点击事件
        $(".hand").click(function () {
          let playerHand = $(this).data("hand");

          let cpuHand = CPU_hands[Math.floor(Math.random() * CPU_hands.length)];
          let result = judge(playerHand, cpuHand);

          // 如果胜利
          if (result === TEXT_WIN) {
            comboCount++; // 连击次数加1
            if (comboCount === 3) {
              alert("連撃3回達成！");
            }
          } else {
            comboCount = 0; // 其他结果，连击次数重置
          }

          // 保存到历史记录
          history.push({
            player_name: $("#name").val() || "プレイヤー",
            player: playerHand,
            cpu: cpuHand,
            result: result,
          });

          // 如果历史记录超过10条，删除最早的一条
          if (history.length > 10) {
            history.shift();
          }

          // 结果显示
          render(history);
        });

        // 删除按钮点击事件
        $("#history").on("click", ".delete", function () {
          let index = $(this).data("index"); // 获取要删除的记录索引
          history.splice(index, 1); // 根据索引删除历史记录
          render(history);
        });
      });

      function judge(player, cpu) {
        // 特例
        if (player === TEXT_GUN) {
          return TEXT_WIN;
        }

        if (player === cpu) {
          return TEXT_DRAW;
        }

        if (
          (player === TEXT_ROCK && cpu === TEXT_SCISSORS) ||
          (player === TEXT_SCISSORS && cpu === TEXT_PAPER) ||
          (player === TEXT_PAPER && cpu === TEXT_ROCK)
        ) {
          return TEXT_WIN;
        }
        return TEXT_LOSE;
      }

      function render(history) {
        // 清空历史记录显示
        $("#history").html("");

        // 初始化分数对象
        let score = { win: 0, lose: 0, draw: 0 };

        // 遍历历史记录，计算分数并生成HTML
        for (let i = 0; i < history.length; i++) {
          // 获取当前记录
          let recode = history[i];

          // 新建一个<li>元素来显示每一局的结果
          let card = $("<li>");
          // 设置文本内容，包括玩家名称、玩家手势、CPU手势和结果
          card.text(
            recode.player_name +
              " " +
              recode.player +
              "VS" +
              recode.cpu +
              " CPU => " +
              recode.result,
          );
          // 添加一个删除按钮，并绑定数据索引以便删除时使用
          // i 表示当前记录在历史记录数组中的索引，添加到删除按钮的 data-index 属性中，以便在点击删除按钮时能够知道要删除哪一条记录
          card.append($("<button>").text("削除").addClass("delete").data("index", i));

          // 结果为胜利
          if (recode.result === TEXT_WIN) {
            score.win++; // 胜利次数加1
            card.addClass("win").addClass("win");
          }

          // 结果为失败
          else if (recode.result === TEXT_LOSE) {
            score.lose++;
            card.addClass("lose").addClass("lose");
          }

          // 结果为平局
          else if (recode.result === TEXT_DRAW) {
            score.draw++;
            card.addClass("draw").addClass("draw");
          }

          // 将结果添加到历史记录列表中
          $("#history").append(card);
        }

        // 更新分数显示
        $("#score").text(
          "勝ち: " +
            score.win +
            ", 負け: " +
            score.lose +
            ", 引き分け: " +
            score.draw +
            ", 勝率: " +
            ((score.win / history.length) * 100).toFixed(2) +
            "%",
        );
      }
    </script>
  </body>
</html>
