<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ISP10</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <style>
      .win {
        color: green;
      }
      .lose {
        color: red;
      }
      .draw {
        color: gray;
      }
      .gun_button {
        background-color: rgba(255, 213, 0, 0.975);
      }
      .magic_button {
        background-color: rgba(128, 0, 128, 0.975);
      }
    </style>
  </head>
  <body>
    <input type="text" id="name" placeholder="名前" value="プレイヤー" />
    <button class="hand" data-hand="✊">✊</button>
    <button class="hand" data-hand="✌️">✌️</button>
    <button class="hand" data-hand="✋">✋</button>
    <button class="hand gun_button" data-hand="🔫">🔫</button>
    <button class="hand magic_button" data-hand="🪄">🪄</button>
    <!-- 切换CPU强化模式 -->
    <input type="checkbox" id="cpu_pro_toggle" />
    <label for="cpu_pro_toggle">CPU強化モード</label>
    <hr />
    <h3 id="score"></h3>
    <p id="message"></p>
    <ul id="history"></ul>
    <script>
      // 定义常量
      const TEXT_ROCK = "✊";
      const TEXT_SCISSORS = "✌️";
      const TEXT_PAPER = "✋";
      const TEXT_GUN = "🔫";
      const TEXT_MAGIC = "🪄";

      const TEXT_WIN = "勝ち";
      const TEXT_LOSE = "負け";
      const TEXT_DRAW = "引き分け";

      const CPU_HANDS = [TEXT_ROCK, TEXT_SCISSORS, TEXT_PAPER];
      const CPU_HANDS_PRO = [TEXT_ROCK, TEXT_SCISSORS, TEXT_PAPER, TEXT_GUN, TEXT_MAGIC]; // 强化 CPU

      // 定义一个对决结果表，根据玩家和 CPU 的选择来确定结果
      const JUDGE_TABLE = {
        [TEXT_ROCK]: {
          [TEXT_ROCK]: TEXT_DRAW,
          [TEXT_SCISSORS]: TEXT_WIN,
          [TEXT_PAPER]: TEXT_LOSE,
          [TEXT_GUN]: TEXT_LOSE,
          [TEXT_MAGIC]: TEXT_WIN,
        },
        [TEXT_SCISSORS]: {
          [TEXT_ROCK]: TEXT_LOSE,
          [TEXT_SCISSORS]: TEXT_DRAW,
          [TEXT_PAPER]: TEXT_WIN,
          [TEXT_GUN]: TEXT_LOSE,
          [TEXT_MAGIC]: TEXT_WIN,
        },
        [TEXT_PAPER]: {
          [TEXT_ROCK]: TEXT_WIN,
          [TEXT_SCISSORS]: TEXT_LOSE,
          [TEXT_PAPER]: TEXT_DRAW,
          [TEXT_GUN]: TEXT_LOSE,
          [TEXT_MAGIC]: TEXT_WIN,
        },
        [TEXT_GUN]: {
          [TEXT_ROCK]: TEXT_WIN,
          [TEXT_SCISSORS]: TEXT_WIN,
          [TEXT_PAPER]: TEXT_WIN,
          [TEXT_GUN]: TEXT_DRAW,
          [TEXT_MAGIC]: TEXT_LOSE,
        },
        [TEXT_MAGIC]: {
          [TEXT_ROCK]: TEXT_LOSE,
          [TEXT_SCISSORS]: TEXT_LOSE,
          [TEXT_PAPER]: TEXT_LOSE,
          [TEXT_GUN]: TEXT_WIN,
          [TEXT_MAGIC]: TEXT_DRAW,
        },
      };

      // 页面加载完成后执行的函数
      $(function () {
        let history = []; // 历史记录数组

        // 按钮点击事件
        $(".hand").click(function () {
          let is_cpu_pro = $("#cpu_pro_toggle").is(":checked"); // 获取 CPU 强化模式的状态
          let cpu_hands = is_cpu_pro ? CPU_HANDS_PRO : CPU_HANDS; // 根据标志选择 CPU 的手势列表

          let player_hand = $(this).data("hand"); // 获取玩家选择的手势
          let cpu_hand = cpu_hands[Math.floor(Math.random() * cpu_hands.length)]; // 随机生成 CPU 的手势

          // 如果是强化模式，50% 的概率让 CPU 选择一个能赢的手势
          if (is_cpu_pro && Math.random() < 0.5) {
            cpu_hand = let_cpu_win(player_hand, cpu_hand); // 获取一个能让 CPU 获胜的手势
          }

          // 获取对决结果
          let result = judge(player_hand, cpu_hand);

          // 保存到历史记录
          history.push({
            player_name: $("#name").val().trim() || "プレイヤー",
            player: player_hand,
            cpu: cpu_hand,
            result: result,
          });
          // 如果历史记录超过10条，删除最早的一条
          if (history.length > 10) {
            history.shift();
          }

          // 结果显示
          render(history);
        });

        // 删除按钮点击事件
        $("#history").on("click", ".delete", function () {
          let index = $(this).data("index"); // 获取要删除的记录索引
          history.splice(index, 1); // 根据索引删除历史记录
          render(history);
        });

        // 初始渲染
        render(history);
      });

      // 根据玩家和 CPU 的选择来确定结果的函数
      function judge(player_hand, cpu_hand) {
        return JUDGE_TABLE[player_hand][cpu_hand];
      }

      // 返回可以让 CPU 获胜的手势（强化模式下，CPU 可能选择枪或魔法）
      function let_cpu_win(player, cpu) {
        for (let hand in JUDGE_TABLE[player]) {
          if (JUDGE_TABLE[player][hand] === TEXT_LOSE) {
            return hand; // 返回可以让 CPU 获胜的手势
          }
        }
        return cpu; // 如果没有找到合适的手势，返回原来的 CPU 手势
      }

      // 计算胜率的函数
      // 返回胜率字符串，格式为 "XX.XX%"
      function calcRate(score) {
        return (score.total > 0 ? ((score.win / score.total) * 100).toFixed(2) : "0.00") + "%";
      }

      function createScoreText(score) {
        return (
          "勝ち: " +
          score.win +
          "/ 負け: " +
          score.lose +
          "/ 引き分け: " +
          score.draw +
          "/ 試合数: " +
          score.total +
          "/ 勝率: " +
          calcRate(score)
        );
      }

      function createItem(recode, index) {
        // 新建一个<li>元素来显示每一局的结果
        let card = $("<li>");
        {
          // 设置文本内容，包括玩家名称、玩家手势、CPU手势和结果
          card.text(
            recode.player_name +
              " " +
              recode.player +
              "VS" +
              recode.cpu +
              " CPU => " +
              recode.result,
          );
          // 添加一个删除按钮，并绑定数据索引以便删除时使用
          // i 表示当前记录在历史记录数组中的索引，添加到删除按钮的 data-index 属性中，以便在点击删除按钮时能够知道要删除哪一条记录
          card.append($("<button>").text("削除").addClass("delete").data("index", index));
        }

        // 根据结果设置不同的样式，并更新分数对象
        switch (recode.result) {
          case TEXT_WIN:
            card.addClass("win");
            break;
          case TEXT_LOSE:
            card.addClass("lose");
            break;
          case TEXT_DRAW:
            card.addClass("draw");
            break;
        }

        return card;
      }

      function render(history) {
        // 清空历史记录显示
        $("#history").html("");

        // 初始化分数对象
        let score = { win: 0, lose: 0, draw: 0, total: history.length };

        // 遍历历史记录，计算分数并生成HTML
        for (let i = 0; i < history.length; i++) {
          // 获取当前记录
          let recode = history[i];

          // 根据结果设置不同的样式，并更新分数对象
          switch (recode.result) {
            case TEXT_WIN:
              score.win++;
              break;
            case TEXT_LOSE:
              score.lose++;
              break;
            case TEXT_DRAW:
              score.draw++;
              break;
          }

          // 将结果添加到历史记录列表中
          let card = createItem(recode, i);
          $("#history").append(card);
        }

        // 更新分数显示
        $("#score").text(createScoreText(score));

        // 3连胜时，显示特殊消息
        // 查看历史记录数组最后三条记录，如果它们的结果都是胜利，则显示特殊消息
        if (
          history.length >= 3 &&
          history[history.length - 1].result === TEXT_WIN &&
          history[history.length - 2].result === TEXT_WIN &&
          history[history.length - 3].result === TEXT_WIN
        ) {
          $("#message").text("今絶賛連勝中！").addClass("win").removeClass("lose draw");
        } else {
          $("#message").text("");
        }
      }
    </script>
  </body>
</html>
