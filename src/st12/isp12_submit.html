<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ISP11</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <style>
      .win {
        color: green;
      }
      .lose {
        color: red;
      }
      .draw {
        color: gray;
      }
      .gun_button {
        background-color: rgba(255, 213, 0, 0.975);
      }
      .magic_button {
        background-color: rgba(128, 0, 128, 0.975);
      }
    </style>
  </head>
  <body>
    <input type="text" id="name" placeholder="名前" value="プレイヤー" />
    <button class="hand" data-hand="✊">✊</button>
    <button class="hand" data-hand="✌️">✌️</button>
    <button class="hand" data-hand="✋">✋</button>
    <button class="hand gun_button" data-hand="🔫">🔫</button>
    <button class="hand magic_button" data-hand="🪄">🪄</button>
    <!-- 切换CPU强化模式 -->
    <input type="checkbox" id="cpu_pro_toggle" />
    <label for="cpu_pro_toggle">CPU強化モード</label>
    <hr />
    <button id="showAll">全表示</button>
    <button id="showWin">勝ちのみ</button>
    <button id="sortDefault">通常順</button>
    <button id="sortWin">勝ち順</button>
    <button id="reset">リセット</button>
    <p id="saveStatus"></p>
    <hr />
    <h3 id="score"></h3>
    <p id="message"></p>
    <ul id="history"></ul>
    <script>
      // 定义常量
      const TEXT_ROCK = "✊";
      const TEXT_SCISSORS = "✌️";
      const TEXT_PAPER = "✋";
      const TEXT_GUN = "🔫";
      const TEXT_MAGIC = "🪄";

      const TEXT_WIN = "勝ち";
      const TEXT_LOSE = "負け";
      const TEXT_DRAW = "引き分け";

      const CPU_HANDS = [TEXT_ROCK, TEXT_SCISSORS, TEXT_PAPER];
      const CPU_HANDS_PRO = [TEXT_ROCK, TEXT_SCISSORS, TEXT_PAPER, TEXT_GUN, TEXT_MAGIC]; // 强化 CPU

      // 定义一个对决结果表，根据玩家和 CPU 的选择来确定结果
      const JUDGE_TABLE = {
        [TEXT_ROCK]: {
          [TEXT_ROCK]: TEXT_DRAW,
          [TEXT_SCISSORS]: TEXT_WIN,
          [TEXT_PAPER]: TEXT_LOSE,
          [TEXT_GUN]: TEXT_LOSE,
          [TEXT_MAGIC]: TEXT_WIN,
        },
        [TEXT_SCISSORS]: {
          [TEXT_ROCK]: TEXT_LOSE,
          [TEXT_SCISSORS]: TEXT_DRAW,
          [TEXT_PAPER]: TEXT_WIN,
          [TEXT_GUN]: TEXT_LOSE,
          [TEXT_MAGIC]: TEXT_WIN,
        },
        [TEXT_PAPER]: {
          [TEXT_ROCK]: TEXT_WIN,
          [TEXT_SCISSORS]: TEXT_LOSE,
          [TEXT_PAPER]: TEXT_DRAW,
          [TEXT_GUN]: TEXT_LOSE,
          [TEXT_MAGIC]: TEXT_WIN,
        },
        [TEXT_GUN]: {
          [TEXT_ROCK]: TEXT_WIN,
          [TEXT_SCISSORS]: TEXT_WIN,
          [TEXT_PAPER]: TEXT_WIN,
          [TEXT_GUN]: TEXT_DRAW,
          [TEXT_MAGIC]: TEXT_LOSE,
        },
        [TEXT_MAGIC]: {
          [TEXT_ROCK]: TEXT_LOSE,
          [TEXT_SCISSORS]: TEXT_LOSE,
          [TEXT_PAPER]: TEXT_LOSE,
          [TEXT_GUN]: TEXT_WIN,
          [TEXT_MAGIC]: TEXT_DRAW,
        },
      };

      // 页面加载完成后执行的函数
      $(function () {
        // 定义一个对象来保存渲染所需的参数，包括历史记录、当前排序方式和当前过滤方式
        let renderArgs = {
          history: [], // 历史记录数组
          currentSort: "default", // 当前排序方式，默认为 "default"
          currentFilter: "all", // 当前过滤方式，默认为 "all"
        };

        // 复原历史记录
        let renderArgsJson = localStorage.getItem("GameRenderArgs");
        if (renderArgsJson) {
          renderArgs = JSON.parse(renderArgsJson);
        }

        // 过滤和排序按钮点击事件
        $("#showAll").click(function () {
          renderArgs.currentFilter = "all";
          render(renderArgs);
        });
        $("#showWin").click(function () {
          renderArgs.currentFilter = "win";
          render(renderArgs);
        });
        $("#sortDefault").click(function () {
          renderArgs.currentSort = "default";
          render(renderArgs);
        });
        $("#sortWin").click(function () {
          renderArgs.currentSort = "win";
          render(renderArgs);
        });
        $("#reset").click(function () {
          localStorage.removeItem("GameRenderArgs"); // 从浏览器中删除保存的历史记录

          renderArgs.history = []; // 清空历史记录数组
          renderArgs.currentSort = "default"; // 重置排序方式
          renderArgs.currentFilter = "all"; // 重置过滤方式
          render(renderArgs); // 重新渲染页面

          $("#saveStatus").text("未保存");
          $("#reset").prop("disabled", true); // 禁用重置按钮
        });

        // 按钮点击事件
        $(".hand").click(function () {
          let is_cpu_pro = $("#cpu_pro_toggle").is(":checked"); // 获取 CPU 强化模式的状态
          let cpu_hands = is_cpu_pro ? CPU_HANDS_PRO : CPU_HANDS; // 根据标志选择 CPU 的手势列表

          let player_hand = $(this).data("hand"); // 获取玩家选择的手势
          let cpu_hand = cpu_hands[Math.floor(Math.random() * cpu_hands.length)]; // 随机生成 CPU 的手势

          // 如果是强化模式，50% 的概率让 CPU 选择一个能赢的手势
          if (is_cpu_pro && Math.random() < 0.5) {
            cpu_hand = let_cpu_win(player_hand, cpu_hand); // 获取一个能让 CPU 获胜的手势
          }

          // 获取对决结果
          let result = judge(player_hand, cpu_hand);

          // 保存到历史记录
          renderArgs.history.push({
            player_name: $("#name").val().trim() || "プレイヤー",
            player: player_hand,
            cpu: cpu_hand,
            result: result,
            time_stamp: Date.now(),
          });
          // 如果历史记录超过10条，删除最早的一条
          if (renderArgs.history.length > 10) {
            renderArgs.history.shift();
          }

          // 结果显示
          render(renderArgs);
        });

        // 删除按钮点击事件
        $("#history").on("click", ".delete", function () {
          let index = $(this).data("index"); // 获取要删除的记录索引
          renderArgs.history.splice(index, 1); // 根据索引删除历史记录
          render(renderArgs);
        });

        // 初始渲染
        render(renderArgs);
      });

      function getRenderData(renderArgs) {
        // 创建一个新的数组来渲染历史记录，避免直接修改原始历史记录数组
        let display_data = renderArgs.history.slice();

        // 数据排序
        switch (renderArgs.currentSort) {
          case "win":
            display_data.sort(sortHistory);
            break;
          case "default":
          default:
            // 不排序，保持原始顺序
            break;
        }

        // 数据过滤
        switch (renderArgs.currentFilter) {
          case "win":
            display_data = display_data.filter((item) => item.result === TEXT_WIN);
            break;
          case "all":
          default:
            // 不过滤，显示全部
            break;
        }

        return display_data;
      }

      // 排序历史记录的函数，按照胜负结果排序，胜利 < 失败 < 引き分け
      function sortHistory(itemA, itemB) {
        // 按照胜负结果排序 胜利 < 失败
        const result_order = { [TEXT_WIN]: 1, [TEXT_DRAW]: 2, [TEXT_LOSE]: 3 };
        return result_order[itemA.result] - result_order[itemB.result];
      }

      // 根据玩家和 CPU 的选择来确定结果的函数
      function judge(player_hand, cpu_hand) {
        return JUDGE_TABLE[player_hand][cpu_hand];
      }

      // 返回可以让 CPU 获胜的手势（强化模式下，CPU 可能选择枪或魔法）
      function let_cpu_win(player, cpu) {
        for (let hand in JUDGE_TABLE[player]) {
          if (JUDGE_TABLE[player][hand] === TEXT_LOSE) {
            return hand; // 返回可以让 CPU 获胜的手势
          }
        }
        return cpu; // 如果没有找到合适的手势，返回原来的 CPU 手势
      }

      // 计算胜率的函数
      // 返回胜率字符串，格式为 "XX.XX%"
      function calcRate(scoreArgs) {
        let result = "0.00%";
        if (scoreArgs.total > 0)
          result = ((scoreArgs.win / scoreArgs.total) * 100).toFixed(2) + "%";
        return result;
      }

      function createScoreText(scoreArgs) {
        return (
          "勝ち: " +
          scoreArgs.win +
          "/ 負け: " +
          scoreArgs.lose +
          "/ 引き分け: " +
          scoreArgs.draw +
          "/ 試合数: " +
          scoreArgs.total +
          "/ 勝率: " +
          calcRate(scoreArgs)
        );
      }

      function createItem(recode, index) {
        // 新建一个<li>元素来显示每一局的结果
        let card = $("<li>");

        // 设置文本内容，包括玩家名称、玩家手势、CPU手势和结果
        let card_text =
          "[" +
          new Date(recode.time_stamp).toLocaleTimeString() +
          "] " +
          recode.player_name +
          " " +
          recode.player +
          "VS" +
          recode.cpu +
          " => " +
          recode.result;
        card.text(card_text);

        // 添加一个删除按钮，并绑定数据索引以便删除时使用
        // i 表示当前记录在历史记录数组中的索引，添加到删除按钮的 data-index 属性中，以便在点击删除按钮时能够知道要删除哪一条记录
        card.append($("<button>").text("削除").addClass("delete").data("index", index));

        // 根据结果设置不同的样式，并更新分数对象
        switch (recode.result) {
          case TEXT_WIN:
            card.addClass("win");
            break;
          case TEXT_LOSE:
            card.addClass("lose");
            break;
          case TEXT_DRAW:
            card.addClass("draw");
            break;
        }

        return card;
      }

      // 3连胜时，显示特殊消息
      function checkThreeWins(history) {
        // 查看历史记录数组最后三条记录，如果它们的结果都是胜利，则显示特殊消息
        if (
          history.length >= 3 &&
          history[history.length - 1].result === TEXT_WIN &&
          history[history.length - 2].result === TEXT_WIN &&
          history[history.length - 3].result === TEXT_WIN
        ) {
          $("#message").text("今絶賛連勝中！").addClass("win").removeClass("lose draw");
        } else {
          $("#message").text("");
        }
      }

      // 渲染历史记录和分数的函数
      function render(renderArgs) {
        $("#history").html(""); // 清空历史记录显示

        let display_data = getRenderData(renderArgs); // 获取要渲染的数据

        // 遍历历史记录，计算分数并生成HTML
        let scoreArgs = { win: 0, lose: 0, draw: 0, total: renderArgs.history.length };
        for (let i = 0; i < display_data.length; i++) {
          let recode = display_data[i]; // 获取当前记录
          // 根据结果设置不同的样式，并更新分数对象
          switch (recode.result) {
            case TEXT_WIN:
              scoreArgs.win++;
              break;
            case TEXT_LOSE:
              scoreArgs.lose++;
              break;
            case TEXT_DRAW:
              scoreArgs.draw++;
              break;
          }
          $("#history").append(createItem(recode, i)); // 将结果添加到历史记录列表中
        }

        $("#score").text(createScoreText(scoreArgs)); // 更新分数显示
        checkThreeWins(renderArgs.history); // 3连胜时，显示特殊消息

        // 保存到浏览器
        var renderArgsJson = JSON.stringify(renderArgs);
        localStorage.setItem("GameRenderArgs", renderArgsJson);
        $("#saveStatus").text("保存済み");
        $("#reset").prop("disabled", false); // 启用重置按钮
      }
    </script>
  </body>
</html>
