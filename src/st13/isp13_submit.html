<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cat API Sample</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  </head>
  <body>
    <button id="loadCat">ねこ読込</button>
    <p id="apiStatus"></p>
    <div id="catArea"></div>
    <div id="userArea"></div>
    <script>
      $(function () {
        const CAT_API = "https://api.thecatapi.com/v1/images/search";
        $("#loadCat").click(function () {
          // 由于 fetch 是异步的，需要一个计数器来跟踪请求完成的次数
          var count = 0;
          $("#catArea").html(""); // 清空之前的图片
          $("#apiStatus").text("読込中..."); // 显示加载状态
          $("#loadCat").prop("disabled", true); // 禁用按钮，防止重复点击

          // 连续请求3次
          for (let i = 0; i < 3; i++) {
            fetch(CAT_API)
              .then(function (res) {
                return res.json();
              })
              .then(function (data) {
                // 将获取到的猫咪图片添加到页面中
                $("#catArea").append(
                  $("<img>").attr("src", data[0].url).css({
                    width: "32%",
                    "margin-right": "1%",
                    "object-fit": "cover",
                  }),
                );
              })
              .catch(function (err) {
                console.error(err);
              })

              // 无论成功还是失败，都增加计数器并检查是否所有请求都完成
              .finally(function () {
                count++;
                if (count >= 3) {
                  $("#apiStatus").text("");
                  $("#loadCat").prop("disabled", false);
                }
              });
          }
        });
      });
    </script>
  </body>
</html>
