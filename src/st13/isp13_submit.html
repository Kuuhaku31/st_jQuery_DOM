<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cat API Sample</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  </head>
  <body>
    <button id="loadCat">ねこ読込</button>
    <button id="loadUser">ユーザー読込</button>
    <p id="apiStatus"></p>
    <div id="catArea"></div>
    <div id="userArea"></div>
    <script>
      $(function () {
        const CAT_API = "https://api.thecatapi.com/v1/images/search";
        const USER_API = "https://randomuser.me/api/?results=3&nat=jp";

        $("#loadCat").click(function () {
          // 显示加载状态
          $("#apiStatus").text("読込中...");

          // disable 按钮
          $("#loadCat").prop("disabled", true);

          fetch(CAT_API)
            .then(function (res) {
              return res.json();
            })
            .then(function (data) {
              console.log(data);
              const img = $("<img>").attr("src", data[0].url).css("max-width", "100%");
              $("#catArea").html(img);
            })
            .catch(function (err) {
              console.error(err);
            })

            // 无论成功还是失败，都要恢复按钮和状态
            .finally(function () {
              $("#apiStatus").text("");
              $("#loadCat").prop("disabled", false);
            });
        });

        $("#loadUser").click(function () {
          fetch(USER_API)
            .then(function (res) {
              return res.json();
            })
            .then(function (data) {
              console.log(data);
            })
            .catch(function (err) {
              console.error(err);
            });
          // $("#userArea").html(users.join(""));
        });
      });
    </script>
  </body>
</html>
